<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" id="honeybee-svg" aria-label="Honeybee character">
  <defs>
    <radialGradient id="bodyGrad" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#1a4a8a"/>
      <stop offset="100%" stop-color="#022658"/>
    </radialGradient>
    <radialGradient id="stripeGrad" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FFE566"/>
      <stop offset="100%" stop-color="#F5C518"/>
    </radialGradient>
    <radialGradient id="wingGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(220,240,255,0.9)"/>
      <stop offset="100%" stop-color="rgba(180,220,255,0.4)"/>
    </radialGradient>
    <filter id="glow-bee">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Wings (animate with CSS) -->
  <g id="wings" filter="url(#glow-bee)">
    <!-- Left wing -->
    <ellipse id="wing-left" cx="38" cy="40" rx="22" ry="13"
      fill="url(#wingGrad)" stroke="rgba(180,220,255,0.6)" stroke-width="1"
      transform="rotate(-20 38 40)">
      <animateTransform attributeName="transform" type="rotate"
        values="-20 38 40; -35 38 40; -20 38 40"
        dur="0.15s" repeatCount="indefinite"/>
    </ellipse>
    <!-- Right wing -->
    <ellipse id="wing-right" cx="82" cy="40" rx="22" ry="13"
      fill="url(#wingGrad)" stroke="rgba(180,220,255,0.6)" stroke-width="1"
      transform="rotate(20 82 40)">
      <animateTransform attributeName="transform" type="rotate"
        values="20 82 40; 35 82 40; 20 82 40"
        dur="0.15s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Body -->
  <ellipse cx="60" cy="72" rx="26" ry="30" fill="url(#bodyGrad)"/>

  <!-- Yellow stripes -->
  <rect x="36" y="62" width="48" height="9" rx="4" fill="url(#stripeGrad)" opacity="0.95"/>
  <rect x="36" y="76" width="48" height="9" rx="4" fill="url(#stripeGrad)" opacity="0.95"/>
  <rect x="36" y="90" width="48" height="7" rx="4" fill="url(#stripeGrad)" opacity="0.85"/>

  <!-- Stinger -->
  <ellipse cx="60" cy="101" rx="5" ry="7" fill="#022658"/>
  <polygon points="60,106 56,114 64,114" fill="#022658"/>

  <!-- Head -->
  <circle cx="60" cy="42" r="22" fill="url(#bodyGrad)"/>

  <!-- Antennae -->
  <line x1="50" y1="22" x2="38" y2="10" stroke="#022658" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="37" cy="9" r="4" fill="#FFF778"/>
  <line x1="70" y1="22" x2="82" y2="10" stroke="#022658" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="83" cy="9" r="4" fill="#FFF778"/>

  <!-- Eyes -->
  <circle cx="51" cy="42" r="8" fill="white"/>
  <circle cx="69" cy="42" r="8" fill="white"/>
  <circle cx="53" cy="43" r="5" fill="#1a1a2e"/>
  <circle cx="71" cy="43" r="5" fill="#1a1a2e"/>
  <!-- Pupils shine -->
  <circle cx="55" cy="41" r="1.5" fill="white"/>
  <circle cx="73" cy="41" r="1.5" fill="white"/>

  <!-- Smile -->
  <path d="M 51 55 Q 60 62 69 55" stroke="#FFF778" stroke-width="2.5" fill="none" stroke-linecap="round"
    id="bee-smile"/>

  <!-- Blush (hidden by default, shown via JS class) -->
  <circle class="blush-mark" cx="44" cy="52" r="6" fill="#FFCDD2" opacity="0" id="blush-left"/>
  <circle class="blush-mark" cx="76" cy="52" r="6" fill="#FFCDD2" opacity="0" id="blush-right"/>

  <!-- Hearts eyes (hidden, shown via JS) -->
  <text id="heart-eyes" x="43" y="50" font-size="14" fill="#ff6b9d" opacity="0" text-anchor="middle">♥</text>
  <text id="heart-eyes2" x="77" y="50" font-size="14" fill="#ff6b9d" opacity="0" text-anchor="middle">♥</text>
</svg>
