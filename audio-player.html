<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Audio Player</title>
  <style>
    body {
      font-family: sans-serif;
      background: #1e1e2e;
      color: #cdd6f4;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    h1 {
      margin-bottom: 20px;
      font-size: 1.5rem;
      color: #cba6f7;
    }
    .player-card {
      background: #313244;
      border-radius: 12px;
      padding: 30px 40px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
      text-align: center;
      max-width: 480px;
      width: 90%;
    }
    input[type="file"] {
      margin: 16px 0;
      color: #cdd6f4;
      font-size: 0.9rem;
    }
    audio {
      width: 100%;
      margin-top: 16px;
      border-radius: 8px;
    }
    p {
      font-size: 0.85rem;
      color: #a6adc8;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="player-card">
    <h1>🎵 Audio Player</h1>
    <p>Select an audio file from your computer to play it here.</p>
    <input type="file" id="fileInput" accept="audio/*" />
    <audio id="audioPlayer" controls></audio>
    <p id="fileName"></p>
  </div>

  <script>
    const fileInput = document.getElementById('fileInput');
    const audioPlayer = document.getElementById('audioPlayer');
    const fileName = document.getElementById('fileName');

    fileInput.addEventListener('change', function () {
      const file = this.files[0];
      if (file) {
        const url = URL.createObjectURL(file);
        audioPlayer.src = url;
        audioPlayer.play();
        fileName.textContent = '▶ Now playing: ' + file.name;
      }
    });
  </script>
</body>
</html>
